apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-mltp-stack-postgresql
  namespace: grafana-mltp
  labels:
    helm.sh/chart: grafana-mltp-stack-0.1.0
    app.kubernetes.io/name: grafana-mltp-stack
    app.kubernetes.io/instance: grafana-mltp-stack
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: grafana-mltp-stack
    app.kubernetes.io/component: postgresql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-mltp-stack
      app.kubernetes.io/instance: grafana-mltp-stack
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        helm.sh/chart: grafana-mltp-stack-0.1.0
        app.kubernetes.io/name: grafana-mltp-stack
        app.kubernetes.io/instance: grafana-mltp-stack
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: grafana-mltp-stack
        app.kubernetes.io/component: postgresql
    spec:
      
      serviceAccountName: grafana-mltp-stack
      
      securityContext:
        fsGroup: 0
      containers:
        - name: postgresql
          
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          image: "postgres:14.5"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_PASSWORD
              value: "mythical"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "postgres" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - -e
                - |
                  exec pg_isready -U "postgres" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: grafana-mltp-stack-postgresql-pvc
