# Source: grafana-mltp-stack/templates/beyla-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-mltp-stack-beyla-config
  namespace: grafana-mltp
  labels:
    helm.sh/chart: grafana-mltp-stack-0.1.0
    app.kubernetes.io/name: grafana-mltp-stack
    app.kubernetes.io/instance: grafana-mltp-stack
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: grafana-mltp-stack
    app.kubernetes.io/component: beyla
data:
  beyla-config.yml: |
    # Enable Kubernetes metadata collection
    attributes:
      kubernetes:
        enable: true
        cluster_name: "local-k8s"
    
    # Automatic routes reporting
    routes:
      unmatched: heuristic
    
    # Service discovery configuration - use open ports method
    discovery:
      services:
        - open_ports: "4000-4002"  # Monitor mythical services ports
        - exe_path: "/usr/local/bin/node"  # Target Node.js processes
    
    # Metrics configuration
    metrics:
      interval: 5s
      features: [application, application_span]
    
    # Traces configuration  
    traces:
      features: [application, application_span]
    
    # OTEL exporter configuration
    otel_exporter_otlp:
      endpoint: http://grafana-mltp-stack-alloy.grafana-mltp.svc.cluster.local:4317
      insecure: true
      timeout: 30s
      
    # Log level for debugging
    log_level: info
