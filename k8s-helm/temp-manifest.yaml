# Source: grafana-mltp-stack/templates/grafana-datasources-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-mltp-stack-grafana-datasources
  namespace: grafana-mltp
  labels:
    helm.sh/chart: grafana-mltp-stack-0.1.0
    app.kubernetes.io/name: grafana-mltp-stack
    app.kubernetes.io/instance: grafana-mltp-stack
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: grafana-mltp-stack
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        access: proxy
        url: http://grafana-mltp-stack-mimir:9009/prometheus
        isDefault: true
        editable: true
        jsonData:
          httpMethod: POST
          timeInterval: 5s
          defaultEditor: code
          manageAlerts: true
          alertmanagerUid: mimir
          prometheusType: Mimir
          prometheusVersion: 2.52.0
          cacheLevel: 'High'
          incrementalQuerying: true
          incrementalQueryOverlapWindow: 10m
          queryTimeout: 60s
          defaultRegion: default

      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://grafana-mltp-stack-loki:3100
        editable: true
        jsonData:
          maxLines: 1000
          derivedFields:
            - name: "traceID"
              matcherRegex: "traceID=(\\w+)"
              url: "$${__value.raw}"
              datasourceUid: tempo

      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://grafana-mltp-stack-tempo:3200
        editable: true
        jsonData:
          httpMethod: GET
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: -1h
            spanEndTimeShift: 1h
            tags:
              - key: service.name
                value: service_name
            filterByTraceID: false
            filterBySpanID: false
            customQuery: true
            query: 'method="$${__span.tags.method}"'
          tracesToMetrics:
            datasourceUid: mimir
            spanStartTimeShift: -1h
            spanEndTimeShift: 1h
            tags:
              - key: service.name
                value: service_name
            queries:
              - name: Sample query
                query: 'sum(rate(http_requests_total{$$__tags}[5m]))'
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true
          search:
            hide: false

      - name: Pyroscope
        type: pyroscope
        uid: pyroscope
        access: proxy
        url: http://grafana-mltp-stack-pyroscope:4040
        editable: true
        jsonData:
          minStep: '15s'
